<style>

#map{height:500px;border-radius:12px;margin:20px 0;border:3px solid #667eea}

.success{color:#0f0}

<body>

<div class="container">

  <div class="content">

    <!-- LIVE FILTER SECTION -->

        </div>
        
        <div class="filter-item">
          <label>Max area: <span class="filter-value" id="maxAreaValue">5000</span> m²</label>

      <div class="filter-checkboxes">

    <div id="mapContainer" style="display:none">

    </div>

    <div class="log" id="log">&gt; Väntar på fil...</div>

<script>
var SQL_READY=false,ALL_PROPERTIES=[],SCAN_RESULTS={ready:[],needsOCR:[],noPlan:[]},PAUSED=false,CURRENT_INDEX=0;
var map=null,markers={};
var DETECTED_KOMMUN='botkyrka'; // Auto-detecteras från filnamn

// Filter state
var filters={
  minArea:800,
  maxArea:5000,
  showGreen:true,
  showOrange:true,
  showBlue:false
};

// ═══════════════════════════════════════════════════════════
// ÅTERANVÄND KOD FRÅN LANDSPLIT
// ═══════════════════════════════════════════════════════════

var NGP_CLIENT_ID='FwDm3E0EDaLbpXLXDPfKWQqgWeEa';
var NGP_CLIENT_SECRET='2zYvqMrqeOZOr6ehpKzrTMJQkvMa';
var NGP_TOKEN_URL='https://apimanager.lantmateriet.se/oauth2/token';
var NGP_BASE_URL='https://api.lantmateriet.se/distribution/geodatakatalog/sokning/v1/detaljplan/v2';
var SWEREF_CRS='http://www.opengis.net/def/crs/EPSG/0/3006';

var MUNI_CODES={
  'botkyrka':'0127','stockholm':'0180','huddinge':'0126','haninge':'0136',
  'tyresö':'0138','nacka':'0182','värmdö':'0120','täby':'0160'
};

var ngpToken=null,ngpTokenExpiry=0;

function wgs84ToSweref(lat,lon){
  var a=6378137.0,f=1.0/298.257222101,e2=f*(2.0-f);
  var lat0=0.0,lon0=15.0,k0=0.9996,FN=0.0,FE=500000.0;
  var phi=lat*Math.PI/180.0,lambda=lon*Math.PI/180.0,lambda0=lon0*Math.PI/180.0;
  var n=f/(2.0-f),n2=n*n,n3=n2*n,n4=n2*n2,n5=n4*n;
  var A=a/(1.0+n)*(1.0+n2/4.0+n4/64.0);
  var alpha1=(1.0/2.0)*n-(2.0/3.0)*n2+(5.0/16.0)*n3+(41.0/180.0)*n4-(127.0/288.0)*n5;
  var alpha2=(13.0/48.0)*n2-(3.0/5.0)*n3+(557.0/1440.0)*n4+(281.0/630.0)*n5;
  var alpha3=(61.0/240.0)*n3-(103.0/140.0)*n4+(15061.0/26880.0)*n5;
  var alpha4=(49561.0/161280.0)*n4-(179.0/168.0)*n5;
  var e_prime=Math.sqrt(e2);
  var t=Math.sinh(Math.atanh(Math.sin(phi))-e_prime*Math.atanh(e_prime*Math.sin(phi)));
  var xi_prime=Math.atan(t/Math.cos(lambda-lambda0));
  var eta_prime=Math.atanh(Math.sin(lambda-lambda0)/Math.sqrt(1.0+t*t));
  var xi=xi_prime+alpha1*Math.sin(2.0*xi_prime)*Math.cosh(2.0*eta_prime)+
    alpha2*Math.sin(4.0*xi_prime)*Math.cosh(4.0*eta_prime)+
    alpha3*Math.sin(6.0*xi_prime)*Math.cosh(6.0*eta_prime)+
    alpha4*Math.sin(8.0*xi_prime)*Math.cosh(8.0*eta_prime);
  var eta=eta_prime+alpha1*Math.cos(2.0*xi_prime)*Math.sinh(2.0*eta_prime)+
    alpha2*Math.cos(4.0*xi_prime)*Math.sinh(4.0*eta_prime)+
    alpha3*Math.cos(6.0*xi_prime)*Math.sinh(6.0*eta_prime)+
    alpha4*Math.cos(8.0*xi_prime)*Math.sinh(8.0*eta_prime);
  var N=FN+k0*A*xi,E=FE+k0*A*eta;
  return{E:Math.round(E),N:Math.round(N)};
}

function pointInRing(px,py,ring){
  if(!ring||ring.length<3)return false;
  var inside=false;
  for(var i=0,j=ring.length-1;i<ring.length;j=i++){
    var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    var intersect=((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi);
    if(intersect)inside=!inside;
  }
  return inside;
}

function pointInGeometry(px,py,geom){
  if(!geom)return false;
  if(geom.type==='Polygon')return pointInRing(px,py,geom.coordinates[0]);
  if(geom.type==='MultiPolygon')return geom.coordinates.some(function(p){return pointInRing(px,py,p[0])});
  return false;
}

function extractSizeFromText(text){
  var t=(text||'').toLowerCase();
  var patterns=[
    /minsta?\s*(?:fastighets?)?storlek[^0-9]*?(\d{3,6})\s*(?:kvadratmeter|kvm|m[\u00b22]|m2)/i,
    /lägsta\s*(?:fastighets?)?storlek[^0-9]*?(\d{3,6})\s*(?:kvadratmeter|kvm|m[\u00b22]|m2)/i,
    /(\d+[,.]?\d*)\s*(?:ha|hektar)/i,
    /(\d{3,6})\s*(?:kvadratmeter|kvm|m[\u00b22]|m2)/i,
    /(?:minst|lägst|minsta)[^0-9]*?(\d{3,6})/i,
    /areal[^0-9]*?(\d{3,6})/i,
    /storlek[^0-9]*?(\d{3,6})/i,
    /\bf\s+(\d{3,5})\b/i,
    /(\d{3,6})\s*kvadrat/i,
    /(\d[\s]?\d{3})\s*(?:kvadratmeter|kvm|m[\u00b22]|m2)/i,
    /^\s*(\d{3,6})\s*$/m,
    /(\d{3,6})\s*(?:m²|m2|kvm|kvadratmeter)/i
  ];
  for(var i=0;i<patterns.length;i++){
    var m=t.match(patterns[i]);
    if(m){
      var rawVal=m[1].replace(/[\s,]/g,'');
      var v;
      if(patterns[i].toString().includes('hektar')){
        var hectares=parseFloat(rawVal.replace(',','.'));
        v=Math.round(hectares*10000);
      }else{
        v=parseInt(rawVal);
      }
      if(v>=50&&v<=20000)return v;
    }
  }
  return null;
}

function getNGPToken(cb){
  var now=Date.now();
  if(ngpToken&&now<ngpTokenExpiry-300000){
    cb(ngpToken);return;
  }
  fetch(NGP_TOKEN_URL,{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'grant_type=client_credentials&client_id='+NGP_CLIENT_ID+'&client_secret='+NGP_CLIENT_SECRET})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.access_token){
      ngpToken=d.access_token;
      ngpTokenExpiry=Date.now()+(d.expires_in||3600)*1000;
      cb(ngpToken);
    }else{cb(null)}
  }).catch(function(){cb(null)});
}

function searchNGP(lat,lon,kommun,cb){
  var code=MUNI_CODES[kommun.toLowerCase()];
  if(!code){log('Ingen kommunkod för: '+kommun,'error');cb(null);return;}
  
  getNGPToken(function(token){
    if(!token){cb(null);return;}
    
    var sw=wgs84ToSweref(lat,lon);
    var d=50;
    var url=NGP_BASE_URL+'/collections/'+code+'/items'
      +'?bbox='+(sw.E-d)+','+(sw.N-d)+','+(sw.E+d)+','+(sw.N+d)
      +'&bbox-crs='+encodeURIComponent(SWEREF_CRS)
      +'&limit=200';
    
    fetch(url,{headers:{'Authorization':'Bearer '+token,'Accept':'application/geo+json'}})
    .then(function(r){return r.json()})
    .then(function(data){
      if(!data||!data.features||!data.features.length){cb(null);return;}
      
      var result={planNamn:null,minSize:null};
      var dpFeatures=[],pbFeatures=[];
      
      data.features.forEach(function(f){
        var ft=(f.properties&&f.properties.feature&&f.properties.feature.typ)||'';
        if(ft==='detaljplan'){
          // Försök hitta namn i olika fält
          if(!result.planNamn){
            result.planNamn=f.properties.planNamn||
                            f.properties.title||
                            (f.properties.detaljplan&&f.properties.detaljplan.namn)||
                            'Detaljplan';
          }
          dpFeatures.push(f);
        }
        if(f.properties&&(f.properties.planbestammelse||f.properties.egenskapsbestammelse)){
          pbFeatures.push(f);
        }
      });
      
      // Kolla om vi hittade NÅGON detaljplan (inte om den har namn)
      if(dpFeatures.length===0){cb(null);return;}
      
      pbFeatures.forEach(function(f){
        var pb=(f.properties||{}).planbestammelse||(f.properties||{}).egenskapsbestammelse||{};
        var formulering=pb.bestammelseformulering||'';
        var fl=formulering.toLowerCase();
        var isMinTomt=fl.indexOf('tomtplats')!==-1||fl.indexOf('tomtstorlek')!==-1||
          fl.indexOf('fastighetsstorlek')!==-1||fl.indexOf('minsta tomt')!==-1;
        
        if(!isMinTomt)return;
        
        var varde=pb.bestammelsevarde;
        if(varde){
          var v=null;
          if(varde.variabelvarde!=null){
            v=parseFloat(varde.variabelvarde);
          }else if(Array.isArray(varde)&&varde.length>0&&varde[0].variabelvarde!=null){
            v=parseFloat(varde[0].variabelvarde);
          }
          if(v!=null&&!isNaN(v)&&v>=50&&v<=20000){
            if(!result.minSize||v<result.minSize)result.minSize=v;
          }
        }
        
        if(!result.minSize){
          var ex=extractSizeFromText(formulering);
          if(ex&&(!result.minSize||ex<result.minSize))result.minSize=ex;
        }
      });
      
      cb(result);
    }).catch(function(){cb(null)});
  });
}

// ═══════════════════════════════════════════════════════════
// GPKG LOADING
// ═══════════════════════════════════════════════════════════

window.onload=function(){
  initSqlJs({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/'+f}})
    .then(function(SQL){window.SQL=SQL;SQL_READY=true;log('SQL.js redo','success')})
    .catch(function(){log('SQL.js fel','error')});
};

function log(m,t){
  var d=document.getElementById('log'),e=document.createElement('div');
  e.className=t||'info';e.textContent='> '+m;
  d.appendChild(e);d.scrollTop=d.scrollHeight;
  console.log(m);
}

async function loadGPKG(file){
  if(!file||!file.name.endsWith('.gpkg'))return alert('Välj .gpkg-fil!');
  if(!SQL_READY)return alert('SQL.js inte redo');
  
  // AUTO-DETECTERA KOMMUN från filnamn
  var filename=file.name.toLowerCase();
  if(filename.includes('0120')||filename.includes('varmdo')||filename.includes('värmdö')){
    DETECTED_KOMMUN='värmdö';
    log('Auto-detecterat kommun: Värmdö','success');
  }else if(filename.includes('0127')||filename.includes('botkyrka')){
    DETECTED_KOMMUN='botkyrka';
    log('Auto-detecterat kommun: Botkyrka','success');
  }else if(filename.includes('0180')||filename.includes('stockholm')){
    DETECTED_KOMMUN='stockholm';
    log('Auto-detecterat kommun: Stockholm','success');
  }else if(filename.includes('0126')||filename.includes('huddinge')){
    DETECTED_KOMMUN='huddinge';
    log('Auto-detecterat kommun: Huddinge','success');
  }else{
    log('⚠️ Kunde inte detectera kommun, använder Botkyrka','warning');
    DETECTED_KOMMUN='botkyrka';
  }
  
  log('Läser '+file.name,'info');
  try{
    var buf=await file.arrayBuffer();
    var db=new window.SQL.Database(new Uint8Array(buf));
    
    var tabs=db.exec("SELECT name FROM sqlite_master WHERE type='table'");
    var tab=null;
    for(var i=0;i<tabs[0].values.length;i++){
      if(tabs[0].values[i][0].toLowerCase()==='registerenhetsomradesyta'){
        tab=tabs[0].values[i][0];break;
      }
    }
    if(!tab){log('Ingen fastighetstabell','error');return;}
    
    var res=db.exec('SELECT * FROM "'+tab+'" LIMIT 10000');
    var cols=res[0].columns,rows=res[0].values;
    var gIdx=-1,nIdx=-1;
    
    for(var i=0;i<cols.length;i++){
      var c=cols[i].toLowerCase();
      if(c.indexOf('geom')!==-1)gIdx=i;
      if(c==='etikett'||c.indexOf('beteckning')!==-1)nIdx=i;
    }
    
    ALL_PROPERTIES=[];
    for(var i=0;i<rows.length;i++){
      try{
        var coords=parseWKB(rows[i][gIdx]);
        if(coords&&coords.length>2){
          var area=calcArea(coords);
          var center=coords[Math.floor(coords.length/2)];
          ALL_PROPERTIES.push({
            name:nIdx>=0?rows[i][nIdx]:'Fastighet '+(i+1),
            area:area,
            lat:center[0],
            lon:center[1]
          });
        }
      }catch(e){}
    }
    
    log('Laddat '+ALL_PROPERTIES.length+' fastigheter','success');
    document.getElementById('fileInfo').innerHTML='<strong>✅ '+ALL_PROPERTIES.length+' fastigheter laddade</strong>';
    document.getElementById('fileInfo').style.display='block';
    document.getElementById('step2').style.display='block';
    
    // Initialize map
    initMap();
    
  }catch(e){
    log('Fel: '+e.message,'error');
  }
}

function parseWKB(b){
  if(!b||b.length<50)return null;
  try{
    var v=new DataView(b.buffer||b),off=8;
    var flags=v.getUint8(3),envType=(flags>>1)&7;
    if(envType===1)off+=32;
    else if(envType===2||envType===3)off+=48;
    else if(envType===4)off+=64;
    var byteOrder=v.getUint8(off),le=byteOrder===1;
    off+=1;
    var geomType=v.getUint32(off,le);
    off+=4;
    if(geomType!==3&&geomType!==1003)return null;
    var numRings=v.getUint32(off,le);
    off+=4;
    var numPoints=v.getUint32(off,le);
    off+=4;
    var coords=[];
    for(var i=0;i<numPoints;i++){
      var x=v.getFloat64(off,le),y=v.getFloat64(off+8,le);
      off+=16;
      var lat,lon;
      if(x>100000&&y>6000000){
        lat=55+(y-6100000)/111320;
        lon=15+(x-500000)/(111320*Math.cos(lat*Math.PI/180));
      }else if(x>=10&&x<=25&&y>=55&&y<=70){
        lat=y;lon=x;
      }else{continue;}
      if(lat>=55&&lat<=70&&lon>=10&&lon<=25)coords.push([lat,lon]);
    }
    return coords.length>2?coords:null;
  }catch(e){return null}
}

function calcArea(c){
  var a=0,j=c.length-1;
  for(var i=0;i<c.length;i++){a+=(c[j][1]+c[i][1])*(c[j][0]-c[i][0]);j=i;}
  return Math.abs(a*111320*111320/2);
}

// ═══════════════════════════════════════════════════════════
// MAP INITIALIZATION

function initMap(){
  document.getElementById('mapContainer').style.display='block';
  
  map=L.map('map').setView([59.2,17.8],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors'
  }).addTo(map);
  
  log('Karta initialiserad','success');
}

function addMarker(prop){
  if(!map){
    console.warn('⚠️ Karta inte initialiserad ännu, skippar marker');
    return;
  }
  
  var color=prop.status==='ready'?'#28a745':
            prop.status==='needs_ocr'?'#ffc107':'#17a2b8';
  
  var marker=L.circleMarker([prop.lat,prop.lon],{
    radius:6,
    fillColor:color,
    color:'#fff',
    weight:1,
    fillOpacity:0.8
  });
  
  var popupContent='<b>'+prop.name+'</b><br>Area: '+Math.round(prop.area)+' m²';
  if(prop.planNamn)popupContent+='<br>Plan: '+prop.planNamn;
  if(prop.minTomt)popupContent+='<br>Min tomt: '+prop.minTomt+' m²<br>Potential: '+Math.floor(prop.area/prop.minTomt)+' tomter';
  
  marker.bindPopup(popupContent);
  
  markers[prop.name]={marker:marker,data:prop};
  
  // ALLTID visa på karta under scanning (filter appliceras senare)
  marker.addTo(map);
  
  console.log('✅ Lade till marker:', prop.name, 'Status:', prop.status);
}

// ═══════════════════════════════════════════════════════════
// BULK SCANNING
// ═══════════════════════════════════════════════════════════

async function startScan(){
  document.getElementById('progress').classList.add('active');
  document.getElementById('filterSection').style.display='block';
  log('Startar scanning...','info');
  CURRENT_INDEX=0;
  await scanNext();
}

async function scanNext(){
  if(PAUSED||CURRENT_INDEX>=ALL_PROPERTIES.length){
    if(CURRENT_INDEX>=ALL_PROPERTIES.length){
      log('Scanning klar!','success');
    }
    return;
  }
  
  var prop=ALL_PROPERTIES[CURRENT_INDEX];
  
  searchNGP(prop.lat,prop.lon,DETECTED_KOMMUN,function(ngpData){
    if(!ngpData||!ngpData.planNamn){
      prop.status='no_plan';
      SCAN_RESULTS.noPlan.push(prop);
    }else if(ngpData.minSize){
      prop.planNamn=ngpData.planNamn;
      prop.minTomt=ngpData.minSize;
      prop.potential=Math.floor(prop.area/ngpData.minSize);
      if(prop.area>=ngpData.minSize*2){
        prop.status='ready';
        SCAN_RESULTS.ready.push(prop);
      }else{
        prop.status='no_plan';
        SCAN_RESULTS.noPlan.push(prop);
      }
    }else{
      prop.status='needs_ocr';
      prop.planNamn=ngpData.planNamn;
      SCAN_RESULTS.needsOCR.push(prop);
    }
    
    // Add to map
    addMarker(prop);
    
    CURRENT_INDEX++;
    updateProgress();
    updateFilters();
    
    setTimeout(scanNext,150);
  });
}

function updateProgress(){
  var pct=Math.round((CURRENT_INDEX/ALL_PROPERTIES.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressFill').textContent=pct+'%';
  
  var orangeFiltered=SCAN_RESULTS.needsOCR.filter(function(p){
    return p.area>=filters.minArea&&p.area<=filters.maxArea;
  }).length;
  
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="num">'+CURRENT_INDEX+'</div><div class="label">Scannade</div></div>'+
    '<div class="stat green"><div class="num">'+SCAN_RESULTS.ready.length+'</div><div class="label">Klara att dela</div></div>'+
    '<div class="stat orange"><div class="num">'+SCAN_RESULTS.needsOCR.length+'<small>→ '+orangeFiltered+' filtrerade</small></div><div class="label">Behöver OCR</div></div>'+
    '<div class="stat blue"><div class="num">'+SCAN_RESULTS.noPlan.length+'</div><div class="label">Ingen detaljplan</div></div>';
}

function pauseScan(){
  PAUSED=true;
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('resumeBtn').style.display='inline-block';
  log('Pausad','warning');
}

function resumeScan(){
  PAUSED=false;
  document.getElementById('pauseBtn').style.display='inline-block';
  document.getElementById('resumeBtn').style.display='none';
  log('Fortsätter...','info');
  scanNext();
}

// ═══════════════════════════════════════════════════════════
// LIVE FILTERS
// ═══════════════════════════════════════════════════════════

function updateFilters(){
  // Update filter values
  filters.minArea=parseInt(document.getElementById('minArea').value);
  filters.maxArea=parseInt(document.getElementById('maxArea').value);
  filters.showGreen=document.getElementById('showGreen').checked;
  filters.showOrange=document.getElementById('showOrange').checked;
  filters.showBlue=document.getElementById('showBlue').checked;
  
  // Update labels
  document.getElementById('minAreaValue').textContent=filters.minArea;
  document.getElementById('maxAreaValue').textContent=filters.maxArea;
  
  // Update map
  var exportCount=0;
  Object.keys(markers).forEach(function(name){
    var m=markers[name];
    var prop=m.data;
    
    if(shouldShowProperty(prop)){
      m.marker.addTo(map);
      if(shouldExportProperty(prop))exportCount++;
    }else{
      map.removeLayer(m.marker);
    }
  });
  
  document.getElementById('exportCount').textContent=exportCount;
}

function shouldShowProperty(prop){
  var matchesArea=prop.area>=filters.minArea&&prop.area<=filters.maxArea;
  var matchesStatus=
    (prop.status==='ready'&&filters.showGreen)||
    (prop.status==='needs_ocr'&&filters.showOrange)||
    (prop.status==='no_plan'&&filters.showBlue);
  return matchesArea&&matchesStatus;
}

function shouldExportProperty(prop){
  var matchesArea=prop.area>=filters.minArea&&prop.area<=filters.maxArea;
  return matchesArea&&(prop.status==='ready'||prop.status==='needs_ocr');
}

// ═══════════════════════════════════════════════════════════
// EXPORT FILTERED
// ═══════════════════════════════════════════════════════════

function exportFiltered(){
  var greenFiltered=SCAN_RESULTS.ready.filter(function(p){
    return p.area>=filters.minArea&&p.area<=filters.maxArea;
  });
  
  var orangeFiltered=SCAN_RESULTS.needsOCR.filter(function(p){
    return p.area>=filters.minArea&&p.area<=filters.maxArea;
  }).sort(function(a,b){
    return b.area-a.area; // Största först
  });
  
  var exp={
    exporterad:new Date().toISOString(),
    kommun:DETECTED_KOMMUN.charAt(0).toUpperCase()+DETECTED_KOMMUN.slice(1),
    kommun_kod:MUNI_CODES[DETECTED_KOMMUN.toLowerCase()]||'0000',
    filter:{
      min_area:filters.minArea,
      max_area:filters.maxArea
    },
    stats:{
      gröna:greenFiltered.length,
      orange_totalt:SCAN_RESULTS.needsOCR.length,
      orange_filtrerade:orangeFiltered.length,
      totalt_exporterade:greenFiltered.length+orangeFiltered.length
    },
    gröna:greenFiltered.map(function(p){
      return{
        beteckning:p.name,
        area:Math.round(p.area),
        coords:[p.lat,p.lon],
        ngp:{
          har_detaljplan:true,
          plan_namn:p.planNamn,
          min_tomtstorlek:p.minTomt,
          potential:p.potential
        },
        status:'ready'
      };
    }),
    orange_intressanta:orangeFiltered.map(function(p){
      return{
        beteckning:p.name,
        area:Math.round(p.area),
        coords:[p.lat,p.lon],
        ngp:{
          har_detaljplan:true,
          plan_namn:p.planNamn
        },
        status:'needs_ocr'
      };
    })
  };
  
  var blob=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='bulk_filtered_'+exp.stats.totalt_exporterade+'_properties.json';
  a.click();
  URL.revokeObjectURL(url);
  
  log('Exporterat '+exp.stats.totalt_exporterade+' fastigheter ('+exp.stats.gröna+' gröna, '+exp.stats.orange_filtrerade+' orange)','success');
  alert('✅ Exporterat:\n\n🟢 '+exp.stats.gröna+' gröna (klara)\n🟡 '+exp.stats.orange_filtrerade+' orange (behöver OCR)\n\n📊 Totalt: '+exp.stats.totalt_exporterade+' fastigheter');
}
